{% extends 'Voting/base.html' %}

{% block title %}login{% endblock %}

{% block content %}

<style>
    .login-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 25px;
        background-color: #f9f9f9;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .login-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .login-container label{
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .login-container input[type="text"],
    .login-container input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .login-container button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .login-container button:hover {
        background-color: #0056b3;
    }
    .login-container p {
        text-align: center;
        margin-top: 15px;
    }
    .error {
        color: red;
        text-align: center;
        margin-bottom: 15px;
    }
    

</style>
    <div class="login-container">
        <h2>Login</h2>

        {% if form.errors %}
            <div class="error">
                Invalid username or password. Please try again.
            </div>

        {% endif %}
        <form method="post">
            {% csrf_token %}

            <label>Username</label>
            {{ form.username }}

            <label>Password</label>
            {{ form.password }}
            <button type="submit">Login</button>
        </form>
        <p>
            Don't have an account?
             <a href="{% url 'signup' %}">Sign up here</a>.
        </p>
    </div>
{% endblock %}
